# Application config (loaded via shared.kernel.AppConfig)
# Owner-prefixed keys avoid touching the same line in 3-person dev:
#   shared.*       Person A
#   identity.*     Person A
#   catalog.*      Person B
#   reservation.*  Person C
#   ordering.*     Person C
#   ticketing.*    Person A

# ---- shared / db ----
db.url=jdbc:sqlite:data/theater.db
db.foreignKeys=ON
db.journalMode=WAL
db.busyTimeoutMs=5000
db.synchronous=NORMAL

# ---- reservation ----
reservation.hold.duration.minutes=10
reservation.expireHolds.intervalMs=1000

# ---- ordering ----
ordering.payment.gateway=mock
ordering.payment.mock.successRate=1.0

# ---- shared / outbox ----
shared.outbox.intervalMs=1000
