name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build-test:
    name: build & unit/integration test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Validate wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Lint (spotless + checkstyle)
        run: ./gradlew --no-daemon spotlessCheck checkstyleMain checkstyleTest

      - name: Compile
        run: ./gradlew --no-daemon classes testClasses

      - name: Test (excludes slow/concurrency)
        run: ./gradlew --no-daemon test

      - name: Coverage gate
        run: ./gradlew --no-daemon jacocoTestCoverageVerification

      - name: Publish test results to PR
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          check_name: "JUnit (test)"
          report_paths: build/test-results/test/*.xml
          fail_on_failure: false
          require_tests: false

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ github.run_id }}
          path: |
            build/reports/tests/test
            build/reports/jacoco/test/html
            build/reports/checkstyle
            build/test-results/test/*.xml
          if-no-files-found: ignore

  slow:
    name: concurrency / slow tests
    needs: build-test
    # feat/* → develop の PR では走らせず、push と main 向け PR でだけフル走行。
    # 実体は @Tag("slow") が増えてからゆっくり回す方針。
    if: >-
      github.event_name == 'push'
      || (github.event_name == 'pull_request' && github.base_ref == 'main')
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v3
      - name: Slow / concurrency tests
        run: ./gradlew --no-daemon slowTest
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slow-reports-${{ github.run_id }}
          path: |
            build/reports/tests/slowTest
            build/test-results/slowTest/*.xml
          if-no-files-found: ignore
